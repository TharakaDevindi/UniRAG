spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/unirag
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: gpt-4o-mini
      embedding:
        model: text-embedding-3-small
jwt:
  secret: unirag-secret-key
  expiration: 86400000
